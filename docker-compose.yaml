version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: microservice_postgres
    environment:
      POSTGRES_USER: nabeel
      POSTGRES_PASSWORD: nabeel
      POSTGRES_DB: microservice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: microservice_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: microservice_app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: on-failure

volumes:
  postgres_data: